name: 수영장 시간표 점검

on:
  schedule:
    # 매일 오후 9시 KST — 평소엔 알림만(변경 있을 때만 발송), 매월 1일은 전체 다이제스트.
    # 정각(:00)은 GitHub 스케줄러가 붐벼 실제 시작이 최대 100분까지 밀렸다(21:41·22:40 관측) → 어중간한 분으로.
    - cron: '17 12 * * *'
  workflow_dispatch:

jobs:
  check:
    # 국내(맥) 러너에서 실행. GitHub 호스팅 러너(Azure 해외 IP)에서는 spo.isdc.co.kr로의
    # TCP 연결이 간헐적으로 통째로 막혀(UND_ERR_CONNECT_TIMEOUT, 최대 11분 연속) 크롤이 실패했다.
    # ⚠️ 공개 저장소이므로 이 워크플로에 pull_request 계열 트리거를 절대 추가하지 말 것
    #    (포크가 맥에서 임의 코드를 실행할 수 있게 된다). schedule/workflow_dispatch는 포크에서 발동 불가.
    runs-on: [self-hosted, seongnam-mac]
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      # 자기호스팅 러너는 일회용이 아니라 /tmp가 실행 간에 남는다. 크롤 스텝이 죽어도
      # 텔레그램 스텝은 if:always()로 도는데, 그때 어제 파일을 읽어 옛 알림을 재발송하는 걸 막는다.
      - name: 이전 실행 잔여 파일 정리
        run: rm -f /tmp/schedule-changes.json /tmp/notice-check.json

      # 맥이 24시간 넘게 꺼져 있으면 GitHub이 대기 중인 실행을 취소해 점검이 통째로 누락된다.
      # 직전 실행 시각을 알려 두면 알림에 "N일 누락" 배너를 띄울 수 있다.
      - name: 직전 실행 시각 조회
        id: last
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh run list --workflow=update-schedule.yml --limit 5 \
                   --json databaseId,startedAt,status \
                   --jq "[.[] | select(.status==\"completed\" and .databaseId != ${{ github.run_id }})] | .[0].startedAt // empty")
          echo "prev_run_at=$PREV" >> "$GITHUB_OUTPUT"
          echo "직전 완료 실행: ${PREV:-없음}"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 시간표 크롤링 & 비교
        id: check
        run: node scripts/check-schedule.js
        continue-on-error: true

      - name: 공지 게시판 & 공휴일 점검
        id: notice
        run: node scripts/notice-check.js
        continue-on-error: true
        env:
          HOLIDAY_API_KEY: ${{ secrets.HOLIDAY_API_KEY }}
          # 매월 말일 TO-DO의 '변경사항' 출처(토큰 잠금 Apps Script 프록시 URL, 토큰 포함).
          # 미설정이면 TO-DO는 "변경사항 시트 미연동" 안내로만 발송.
          SEO_CHANGES_CSV_URL: ${{ secrets.SEO_CHANGES_CSV_URL }}

      - name: 변경 감지 시 이슈 생성
        id: issue
        if: steps.check.outcome == 'failure'   # exit 2 = 자동반영 대상 변경(프로그램 시간표)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/schedule-changes.json', 'utf-8'));
            const { date, changed, errors, youthChanged = [], youthErrors = [] } = data;

            // 실제 변경이 없으면(크롤 오류만) 이슈 생성하지 않음 — 매일 실행 시 오류성 이슈 스팸 방지
            if (!changed.length && !youthChanged.length) { core.setOutput('number', ''); return; }

            // 변경 내용 요약 (사람이 읽기 쉽게)
            const fmt = arr => arr.map(r => {
              const lines = r.changes.map(c => `  - ${c.desc}`).join('\n');
              return `### ${r.pool}\n${lines}\n[공식 사이트 확인 →](${r.url})`;
            }).join('\n\n');

            // 자동 적용을 위한 JSON (숨김) — 공사 수영장만. 유스센터는 수동 처리.
            const changesJson = JSON.stringify(changed);
            const allErrors = [...errors, ...youthErrors];

            const publicBlock = changed.length
              ? ['## 🏊 성남도시개발공사 (자동 반영 가능)', '', fmt(changed)]
              : [];
            const youthBlock = youthChanged.length
              ? ['## 🏫 유스센터 (수동 반영 필요)', '',
                 '> 유스센터는 계절제·요일지정 구조라 자동 반영 대상이 아닙니다. `index.html`을 직접 수정해 주세요.', '',
                 fmt(youthChanged)]
              : [];

            const body = [
              `## ⚠️ 시간표 변경 감지 (${date})`,
              '',
              '크롤러가 아래 수영장의 시간표 변경 가능성을 감지했습니다.',
              '**공식 사이트에서 직접 확인 후** 처리해 주세요.',
              '',
              '---',
              '',
              ...publicBlock,
              ...(publicBlock.length && youthBlock.length ? ['', '---', ''] : []),
              ...youthBlock,
              '',
              '---',
              '',
              '## 처리 방법',
              '',
              changed.length ? '- **공사 수영장**: 변경이 맞으면 `/confirm`(자동 반영), 오탐이면 `/reject`' : '',
              youthChanged.length ? '- **유스센터**: 자동 반영 안 됨 → `index.html` 수정 후 이슈를 직접 닫아주세요' : '',
              '',
              '| 상황 | 댓글 입력 |',
              '|------|-----------|',
              '| 공사 변경 내용이 맞음 → 자동 반영 | `/confirm` |',
              '| 크롤러 오탐 → 무시 | `/reject` |',
              '',
              allErrors.length > 0 ? `> ⚠️ 크롤링 실패: ${allErrors.map(e=>e.pool).join(', ')}` : '',
              '',
              `<!-- CHANGES_JSON:${changesJson}:END -->`,
            ].join('\n');

            // 매일 실행이므로 이미 열린 schedule-update 이슈가 있으면 재사용(내용만 갱신) — 중복 이슈 방지
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'schedule-update', state: 'open',
            });
            let number;
            if (open.data.length) {
              number = open.data[0].number;
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: number, body });
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `[자동] ${date} 시간표 변경 감지`, body, labels: ['schedule-update'],
              });
              number = created.data.number;
            }
            core.setOutput('number', number);   // 텔레그램 메시지의 /confirm 링크용

      - name: 텔레그램 발송 (알림 + 공휴일 리마인더)
        if: always()   # 이상 없음이어도 월간 다이제스트로 발송(공휴일 리마인더 포함)
        run: node scripts/notify-telegram.js ${{ steps.issue.outputs.number }}
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PREV_RUN_AT: ${{ steps.last.outputs.prev_run_at }}
