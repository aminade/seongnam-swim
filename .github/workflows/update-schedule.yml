name: 수영장 시간표 점검

on:
  schedule:
    - cron: '0 12 28 * *'   # 매월 28일 오후 9시 KST
    - cron: '0 12 1 * *'    # 매월  1일 오후 9시 KST
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 시간표 크롤링 & 비교
        id: check
        run: node scripts/check-schedule.js
        continue-on-error: true

      - name: 변경 감지 시 이슈 생성
        if: steps.check.outcome == 'failure'   # exit 2 = 변경 감지
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/schedule-changes.json', 'utf-8'));
            const { date, changed, errors } = data;

            // 변경 내용 요약 (사람이 읽기 쉽게)
            const changeLines = changed.map(r => {
              const lines = r.changes.map(c => `  - ${c.desc}`).join('\n');
              return `### ${r.pool}\n${lines}\n[공식 사이트 확인 →](${r.url})`;
            }).join('\n\n');

            // 자동 적용을 위한 JSON (숨김)
            const changesJson = JSON.stringify(changed);

            const body = [
              `## ⚠️ 시간표 변경 감지 (${date})`,
              '',
              '크롤러가 아래 수영장의 시간표 변경 가능성을 감지했습니다.',
              '**공식 사이트에서 직접 확인 후** 댓글로 처리해 주세요.',
              '',
              '---',
              '',
              changeLines,
              '',
              '---',
              '',
              '## 처리 방법',
              '',
              '| 상황 | 댓글 입력 |',
              '|------|-----------|',
              '| 변경 내용이 맞음 → 자동 반영 | `/confirm` |',
              '| 크롤러 오탐 → 무시 | `/reject` |',
              '',
              errors.length > 0 ? `> ⚠️ 크롤링 실패: ${errors.map(e=>e.pool).join(', ')}` : '',
              '',
              `<!-- CHANGES_JSON:${changesJson}:END -->`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[자동] ${date} 시간표 변경 감지`,
              body,
              labels: ['schedule-update'],
            });
