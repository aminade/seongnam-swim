// ===== 유틸 =====
function getNthSundayOfMonth(year, month, n) {
  let count = 0;
  for (let d = 1; d <= 31; d++) {
    const date = new Date(year, month, d);
    if (date.getMonth() !== month) break;
    if (date.getDay() === 0) { count++; if (count === n) return d; }
  }
  return -1;
}

function isClosedDay(pool, date) {
  if (date.getDay() !== 0) return false;
  const y = date.getFullYear(), m = date.getMonth(), d = date.getDate();
  return pool.closedWeeks.some(w => getNthSundayOfMonth(y, m, w) === d);
}

function getSlotsForDate(pool, date) {
  const dow = date.getDay();
  if (dow === 6) return pool.saturdaySlots;
  if (dow === 0) return pool.sundaySlots;
  return pool.weekdaySlots;
}

function getPriceForDate(pool, date) {
  const dow = date.getDay();
  return (dow === 0 || dow === 6) ? pool.weekendPrice : pool.weekdayPrice;
}

function getSlotStatus(slotTime, date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  if (target > today) return 'upcoming';
  if (target < today) return 'past';
  const [ss, es] = slotTime.split('~');
  const [sh, sm] = ss.split(':').map(Number);
  const [eh, em] = es.split(':').map(Number);
  const nowMin = now.getHours() * 60 + now.getMinutes();
  if (nowMin >= eh * 60 + em) return 'past';
  if (nowMin >= sh * 60 + sm) return 'now';
  return 'upcoming';
}

function hasDeepPool(pool) {
  return pool.weekdaySlots.some(s => s.note && s.note.includes('수심'));
}

function getToday() {
  const t = new Date();
  t.setHours(0, 0, 0, 0);
  return t;
}

function formatChipDate(date) {
  return `${date.getMonth() + 1}/${date.getDate()}(${DAY_NAMES[date.getDay()]})`;
}

// ===== 상태 =====
let currentTab = 'today';
let selectedDate = getToday();
const expandedPools = {};

// 달력 상태
const _now = new Date();
let calYear = _now.getFullYear();
let calMonth = _now.getMonth();
const CAL_MIN_YEAR = _now.getFullYear();
const CAL_MIN_MONTH = _now.getMonth();
const CAL_MAX_YEAR = (_now.getMonth() === 11) ? _now.getFullYear() + 1 : _now.getFullYear();
const CAL_MAX_MONTH = (_now.getMonth() + 1) % 12;

// ===== 탭 빌드 =====
function buildDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = '';
  const today = getToday();
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);

  const chips = [
    { id: 'today',    main: '오늘',  sub: formatChipDate(today) },
    { id: 'tomorrow', main: '내일',  sub: formatChipDate(tomorrow) },
    { id: 'calendar', main: '달력보기', sub: '날짜 선택' },
  ];

  chips.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'date-chip' + (currentTab === c.id ? ' active' : '');
    btn.innerHTML = `<span class="chip-main">${c.main}</span><span class="chip-sub">${c.sub}</span>`;
    btn.addEventListener('click', () => {
      currentTab = c.id;
      if (c.id === 'today') selectedDate = new Date(today);
      if (c.id === 'tomorrow') selectedDate = new Date(tomorrow);
      buildDateNav();
      switchView();
    });
    nav.appendChild(btn);
  });
}

function switchView() {
  if (currentTab === 'calendar') {
    document.getElementById('dayView').style.display = 'none';
    document.getElementById('calView').style.display = 'block';
    buildCalendar();
  } else {
    document.getElementById('dayView').style.display = 'block';
    document.getElementById('calView').style.display = 'none';
    renderPools();
  }
}

// ===== 일/이틀 뷰 =====
function renderPools() {
  const today = getToday();
  const isToday = selectedDate.getTime() === today.getTime();

  const openList = POOLS.filter(p => !isClosedDay(p, selectedDate));
  const openCount = openList.length;
  const closedCount = POOLS.length - openCount;

  let mainText = '', subText = '';
  if (openCount === 0) {
    mainText = '오늘은 모든 수영장이 정기휴관이에요 😔';
  } else if (isToday) {
    const hasUpcoming = openList.some(p =>
      getSlotsForDate(p, selectedDate).some(s => getSlotStatus(s.time, selectedDate) !== 'past')
    );
    if (!hasUpcoming) {
      mainText = '오늘 자유수영은 모두 종료됐어요 🌅';
      subText = '내일 또 만나요!';
    } else {
      mainText = `${openCount}개 수영장에서 자유수영을 할 수 있어요`;
      if (closedCount > 0) subText = `${closedCount}곳은 오늘 정기휴관`;
    }
  } else {
    const m = selectedDate.getMonth() + 1;
    const d = selectedDate.getDate();
    mainText = `${m}/${d}(${DAY_NAMES[selectedDate.getDay()]}) · ${openCount}개 수영장 운영`;
    if (closedCount > 0) subText = `${closedCount}곳 정기휴관`;
  }

  document.getElementById('summary').innerHTML =
    `<div class="summary-main">${mainText}</div>` +
    (subText ? `<div class="summary-sub">${subText}</div>` : '');

  const sorted = [...POOLS].sort((a, b) =>
    (isClosedDay(a, selectedDate) ? 1 : 0) - (isClosedDay(b, selectedDate) ? 1 : 0)
  );

  const list = document.getElementById('poolList');
  list.innerHTML = '';

  const hasOpen = sorted.some(p => !isClosedDay(p, selectedDate));
  const hasClosed = sorted.some(p => isClosedDay(p, selectedDate));
  let dividerAdded = false;

  sorted.forEach(pool => {
    const closed = isClosedDay(pool, selectedDate);
    const allDone = !closed && isToday &&
      getSlotsForDate(pool, selectedDate).every(s => getSlotStatus(s.time, selectedDate) === 'past');
    const icon = closed ? '🚫' : allDone ? '🌙' : '🏊🏻‍♂️';
    const isExpanded = expandedPools[pool.id];

    if (closed && !dividerAdded && hasOpen && hasClosed) {
      const div = document.createElement('div');
      div.className = 'section-gap';
      div.innerHTML = '<div class="section-gap-label">정기휴관</div>';
      list.appendChild(div);
      dividerAdded = true;
    }

    const card = document.createElement('div');
    card.className = 'pool-card' + (closed ? ' closed' : allDone ? ' all-done' : '');

    const header = document.createElement('div');
    header.className = 'pool-header';
    header.innerHTML = `
      <div class="pool-icon">${icon}</div>
      <div class="pool-name-text">
        <div class="pool-name">${pool.name}</div>
        <div class="pool-meta">
          <span class="tag tag-area">${pool.area}</span>
          ${pool.feature ? `<span class="tag tag-feature">${pool.feature}</span>` : ''}
          ${hasDeepPool(pool) ? `<span class="tag tag-depth">수심 2M</span>` : ''}
          ${closed ? `<span class="tag tag-closed">정기휴관</span>` : ''}
        </div>
      </div>
      <span class="toggle-icon ${isExpanded ? 'open' : ''}">⌄</span>
    `;
    header.addEventListener('click', () => {
      expandedPools[pool.id] = !expandedPools[pool.id];
      renderPools();
    });
    card.appendChild(header);

    if (closed) {
      const notice = document.createElement('div');
      notice.className = 'closed-notice';
      notice.textContent = `매월 ${pool.closedWeeks.join(', ')}번째 일요일 정기휴관`;
      if (isExpanded) card.appendChild(notice);
    } else {
      const slots = getSlotsForDate(pool, selectedDate);
      const price = getPriceForDate(pool, selectedDate);
      const body = document.createElement('div');
      body.className = 'slots-wrap' + (isExpanded ? ' open' : '');

      const upcoming = slots.filter(s => getSlotStatus(s.time, selectedDate) !== 'past');
      const past = slots.filter(s => getSlotStatus(s.time, selectedDate) === 'past');

      let html = '';

      if (upcoming.length > 0) {
        html += `<div class="slots-section"><div class="slots-label">이용 가능</div><div class="slots-grid">`;
        upcoming.forEach(s => {
          const st = getSlotStatus(s.time, selectedDate);
          html += `<div class="slot-pill ${st === 'now' ? 'now' : ''}">
            ${s.time}<span class="slot-note">${s.dur === 120 ? '2h' : '1h'}${s.note ? ' · ' + s.note : ''}</span>
          </div>`;
        });
        html += `</div></div>`;
      }

      if (past.length > 0 && isToday) {
        html += `<div class="slots-section"><div class="slots-label">종료</div><div class="slots-grid">`;
        past.forEach(s => {
          html += `<div class="slot-pill past">${s.time}</div>`;
        });
        html += `</div></div>`;
      }

      html += `<div class="price-row">
        <div class="price-item"><span class="price-label">일반</span><span class="price-value">${price.adult.toLocaleString()}원</span></div>
        <div class="price-item"><span class="price-label">청소년</span><span class="price-value">${price.teen.toLocaleString()}원</span></div>
        <div class="price-item"><span class="price-label">어린이</span><span class="price-value">${price.child.toLocaleString()}원</span></div>
      </div>`;
      html += `<a href="${pool.url}" target="_blank" class="pool-link">자세히 보기 →</a>`;

      body.innerHTML = html;
      card.appendChild(body);
    }

    list.appendChild(card);
  });
}

// ===== 달력 뷰 =====
function buildCalendar() {
  // 월 레이블
  document.getElementById('calMonthLabel').textContent =
    `${calYear}년 ${calMonth + 1}월`;

  // 버튼 활성화
  const prevBtn = document.getElementById('prevMonthBtn');
  const nextBtn = document.getElementById('nextMonthBtn');
  const atMin = calYear === CAL_MIN_YEAR && calMonth === CAL_MIN_MONTH;
  const atMax = calYear === CAL_MAX_YEAR && calMonth === CAL_MAX_MONTH;
  prevBtn.disabled = atMin;
  nextBtn.disabled = atMax;

  prevBtn.onclick = () => {
    if (atMin) return;
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    buildCalendar();
  };
  nextBtn.onclick = () => {
    if (atMax) return;
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    buildCalendar();
  };

  renderCalendarGrid();
}

function renderCalendarGrid() {
  const body = document.getElementById('calBody');
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();
  const today = getToday();

  let html = '';

  // 빈 칸
  for (let i = 0; i < startDow; i++) {
    html += `<div class="cal-cell cal-empty"></div>`;
  }

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const dow = date.getDay();
    const isToday = date.getTime() === today.getTime();
    const isPast = date < today;
    const isSunday = dow === 0;

    let cls = 'cal-cell';
    if (isSunday) cls += ' cal-sunday';
    if (isPast) cls += ' cal-past';

    // 6개 수영장 전체 태그 (열림/닫힘)
    const poolTags = POOLS.map(p => {
      const c = isClosedDay(p, date);
      return `<span class="cal-tag ${c ? 'closed' : 'open'}">${POOL_SHORT[p.id]}</span>`;
    });
    let tagsHtml = '<div class="cal-closed-tags">';
    for (let r = 0; r < poolTags.length; r += 3) {
      tagsHtml += `<div class="cal-tags-row">${poolTags.slice(r, r + 3).join('')}</div>`;
    }
    tagsHtml += '</div>';

    html += `
      <div class="${cls}">
        <div class="cal-day-num${isSunday ? ' sun' : ''}${isToday ? ' today' : ''}">${d}</div>
        ${tagsHtml}
      </div>`;
  }

  body.innerHTML = html;
}

// ===== 초기화 =====
buildDateNav();
renderPools();
</script>
</body>
</html>
